version: "3.9"

services:
  vulnscout:
    build: .
    container_name: vulnscout
    ports:
      - "8080:8080"
    volumes:
      - ./reports:/app/reports
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - VULNSCOUT_CONFIG=/app/config.yaml
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: ["web", "--host", "0.0.0.0", "--port", "8080"]
